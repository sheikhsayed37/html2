<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Celsius To Fahrenheit</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet">


</head>

<body>

<form class="m-5 p-5">


<div class="mb-3">
    <label class="form-label">Enter Temperature in Celsius</label>
    <input type="text" class="form-control" id="celcius">
</div>

<button type="button" onclick="convert()" class="btn btn-primary">
    Convert
</button>


</form>

<div class="ms-5">
    <h2 id="outputMessage"></h2>
</div>

<script>

function convert(){

    let celcius = parseFloat(document.getElementById("celcius").value);

    let fahrenheit = (celcius * 9/5) + 32;

    document.getElementById("outputMessage").innerText =
    "Fahrenheit = " + fahrenheit;
}

</script>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
