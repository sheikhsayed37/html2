<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Positive Negative Zero</title>

```
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet">
```

</head>

<body>

<form class="m-5 p-5">

```
<div class="mb-3">
    <label class="form-label">Enter Number</label>
    <input type="text" class="form-control" id="num1">
</div>

<button type="button" onclick="checkNumber()" class="btn btn-primary">
    Check
</button>
```

</form>

<div class="ms-5">
    <h2 id="outputMessage"></h2>
</div>

<script>

function checkNumber() {

    let number = parseFloat(document.getElementById("num1").value);

    if(number > 0)
    {
        document.getElementById("outputMessage").innerText =
        "Positive Number";
    }
    else if(number < 0)
    {
        document.getElementById("outputMessage").innerText =
        "Negative Number";
    }
    else
    {
        document.getElementById("outputMessage").innerText =
        "Zero";
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
