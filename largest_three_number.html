<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Largest Of Three Numbers</title>


<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet">


</head>

<body>

<form class="m-5 p-5">

<div class="mb-3">
    <label class="form-label">Enter Number 1</label>
    <input type="text" class="form-control" id="num1">
</div>

<div class="mb-3">
    <label class="form-label">Enter Number 2</label>
    <input type="text" class="form-control" id="num2">
</div>

<div class="mb-3">
    <label class="form-label">Enter Number 3</label>
    <input type="text" class="form-control" id="num3">
</div>

<button type="button" onclick="largest()" class="btn btn-primary">
    Find Largest
</button>


</form>

<div class="ms-5">
    <h2 id="outputMessage"></h2>
</div>

<script>

function largest() {

    let number1 = parseFloat(document.getElementById("num1").value);
    let number2 = parseFloat(document.getElementById("num2").value);
    let number3 = parseFloat(document.getElementById("num3").value);

    if(number1 >= number2 && number1 >= number3)
    {
        document.getElementById("outputMessage").innerText =
        "Largest Number = " + number1;
    }
    else if(number2 >= number1 && number2 >= number3)
    {
        document.getElementById("outputMessage").innerText =
        "Largest Number = " + number2;
    }
    else
    {
        document.getElementById("outputMessage").innerText =
        "Largest Number = " + number3;
    }
}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
