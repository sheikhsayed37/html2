<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5 w-50">
    <h2>Login Page</h2>

    <input type="email" id="Email" class="form-control mb-3" placeholder="Enter Email">

    <input type="password" id="Password" class="form-control mb-3" placeholder="Enter Password">

    <button class="btn btn-primary" onclick="checklogin()">Login</button>

    <h3 id="result" class="mt-3 text-danger"></h3>
</div>

<script>
function checklogin()
 {

    let email = document.getElementById("Email").value;
    let password = document.getElementById("Password").value;

    if(email == "iiuc@gmail.com" && password == "1234") {

        localStorage.setItem("checklogin", "true");

        window.location.href = "homebody.html";
    }
    else {

        
        document.getElementById("result").innerHTML =
        "Login Unsuccessful";
    }
}
</script>

</body>
</html>
